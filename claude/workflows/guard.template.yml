# guard — proje reposu sunucu-tarafı savunması. ÇAĞIRICI; mantık core'dadır:
# `.github/workflows/project-guard.yml` (reusable workflow). init_project.py bunu üretir.
#
# ÜÇ İŞ (hepsi core'daki reusable workflow'da tanımlı):
#   (a) core-leak        : junction içeriği repoya girmiş mi? (R1/D26 — fikri sermaye)
#   (b) validators       : CI'da run_all_validators (core clone'lanır)
#   (c) behavior-surface : davranış-yüzeyi dosyaları main'e doğrudan push ile değişmiş mi?
#
# NEDEN ÇAĞIRICI: eskiden guard'ın TAMAMI her projeye kopyalanıyordu. Core'a eklenen
# `validators` job'u bir projeye elle eklendi, şablona hiç yansımadı (K2, 2026-07-10) ve
# hiçbir şey uyarmadı. Kopya = drift kaynağı. Artık job eklemek/değiştirmek için YALNIZ
# core'daki reusable workflow düzenlenir; tüm projeler bir sonraki koşuda otomatik alır.
#
# ⚠ `@main`e sabitli, `@stable`a DEĞİL — gerekçe project-guard.yml başlığında.
# ⚠ Buraya job EKLEME. Projeye özgü kontrol gerekiyorsa AYRI bir workflow dosyası aç.
name: guard

on:
  push:
  pull_request:

# Reusable workflow izinleri çağırandan devralır; `behavior-surface` job'u
# `gh api commits/{sha}/pulls` çağırır → `pull-requests: read` ŞART (yoksa 403 → yanlış-FAIL).
permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    uses: ix-works/DEV_CORE/.github/workflows/project-guard.yml@main
