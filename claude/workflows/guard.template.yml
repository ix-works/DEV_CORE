# guard — proje reposu sunucu-tarafı savunması (init_project.py bunu üretir)
#
# ÜÇ İŞ:
#   (a) core-leak        : junction içeriği repoya girmiş mi? (R1/D26 — fikri sermaye)
#                          Yerel `.gitignore` + `pre_tool_guard` ilk savunmadır; bu,
#                          onlar atlanırsa devreye giren sunucu-tarafı ağdır.
#   (b) validators       : CI'da run_all_validators. core/ junction'ı CI checkout'unda
#                          YOKTUR → DEV_CORE (public) klonlanır. 2026-07-10 sağlık
#                          denetimi: bu job yoksa validator'ların çoğu YALNIZ elle koşar.
#   (c) behavior-surface : davranış-yüzeyi dosyaları (hook/permission/MCP/CLAUDE.md)
#                          main'e MERGE-OLMAYAN doğrudan push ile değişmiş mi?
#                          Ruleset'in defense-in-depth'i (ADR 0020 §11).
#
# PR'larda davranış-yüzeyi dokunuşu FAIL değil WARNING'dir — görünür kalsın, ama akışı
# kilitlemesin; kilidi CODEOWNERS + ruleset sağlar.
name: guard

on:
  push:
  pull_request:

# F1 fix (2026-07-10): behavior-surface job'u `gh api commits/{sha}/pulls` ile commit'in
# merged-PR'dan gelip gelmediğini sorar → `pull-requests: read` ŞART. Varsayılan GITHUB_TOKEN
# bu izne sahip değil → 403 "Resource not accessible by integration" → F1 yanlış-FAIL verdi.
permissions:
  contents: read
  pull-requests: read

jobs:
  leak:
    name: core-leak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: tracked tree'de core/junction içeriği yok
        run: |
          # 'rules' 2026-07-10'da eklendi (L1b glob-tetiklemeli kurallar). Junction'lanan
          # HER tip burada olmalı; yoksa core içeriği sunucu tarafında yakalanmadan geçer.
          BAD=$(git ls-files -- 'core/**' '.claude/agents/**' '.claude/skills/**' '.claude/commands/**' '.claude/rules/**')
          if [ -n "$BAD" ]; then
            echo "$BAD"
            echo "::error::CORE SIZINTISI: junction içeriği repoya girmiş (R1/D26)"
            exit 1
          fi
          echo "OK — sızıntı yok"

  validators:
    # 2026-07-10 sağlık denetimi (statik katman ③): TD CI'da run_all_validators HİÇ
    # koşmuyordu → 19 validator'ın çoğu yalnız elle çalışıyordu. CI checkout'unda core/
    # YOK (junction + gitignore); DEV_CORE PUBLIC olduğu için auth'suz clone edilir.
    name: validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: DEV_CORE clone → core/ (junction yerine)
        run: |
          git clone --depth 1 https://github.com/ix-works/DEV_CORE.git core
          echo "core klonlandı: $(git -C core rev-parse --short HEAD)"
      - name: python bağımlılıkları
        run: pip install --quiet requests urllib3 || true
      - name: CORE-INDEX'i CLONE'lanan core'a göre yeniden üret
        # C-IDX-01 "üretim adımını unutma" gate'idir; commit'li index gerçek junction'a
        # (geliştirici makinesi) göre üretilir. CI'da core = fresh clone (satır-sonu/doc-set
        # farkı olabilir) → burada indeksi CLONE'a göre yeniden üret, sonra doğrula.
        # Bayat-commit'li-index'i pre-commit (gerçek junction) yakalar; CI çapraz-repo
        # staleness'i yapısal olarak zorlayamaz (gate-static analizi 2026-07-10).
        run: python core/scripts/build_core_index.py || true
      - name: run_all_validators (profil-modlu; core + validators-local)
        env:
          CLAUDE_PROJECT_DIR: ${{ github.workspace }}
        run: python core/scripts/validators/run_all_validators.py

  behavior-surface:
    name: behavior-surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: davranış-yüzeyi değişim kontrolü (F1)
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          REF: ${{ github.ref }}
          BASE: ${{ github.event.pull_request.base.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SURFACE='CLAUDE.md */CLAUDE.md .claude/* .mcp.json project.yaml scripts/hook_shim.py'
          list_touched() {
            git diff --name-only "$1" "$2" -- $SURFACE 2>/dev/null || true
          }
          if [ "$EVENT" = "pull_request" ]; then
            TOUCHED=$(list_touched "$BASE" "$AFTER")
            if [ -n "$TOUCHED" ]; then
              echo "$TOUCHED"
              echo "::warning::PR davranış-yüzeyi dosyası içeriyor — lider incelemesi şart (F1)"
            else
              echo "OK — davranış-yüzeyi dokunuşu yok"
            fi
            exit 0
          fi
          # push olayı: main'e merge-olmayan (doğrudan) push + davranış-yüzeyi = FAIL
          if [ "$REF" = "refs/heads/main" ]; then
            PARENTS=$(git rev-list --parents -n 1 "$AFTER" | wc -w)
            if [ "$PARENTS" -lt 3 ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              TOUCHED=$(list_touched "$BEFORE" "$AFTER")
              if [ -n "$TOUCHED" ]; then
                # SQUASH-MERGE de tek-parent'lıdır (PARENTS<3) ama MERGED PR'dan gelir →
                # review'dan geçmiştir, F1'in engellemek istediği "bypass" DEĞİLDİR
                # (2026-07-10: squash-merge'ler F1'i yanlış-tetikliyordu). Commit bir merged
                # PR'a bağlı mı? Bağlıysa meşru; değilse gerçek doğrudan-push → FAIL.
                MERGED_PR=$(gh api "repos/$REPO/commits/$AFTER/pulls" \
                              --jq '[.[]|select(.merged_at!=null)]|length' 2>/dev/null || echo 0)
                # api hata dönerse (403/JSON) sayısal-olmayan gelir → `-gt` çöker; sayıya zorla.
                echo "$MERGED_PR" | grep -qE '^[0-9]+$' || MERGED_PR=0
                if [ "${MERGED_PR:-0}" -gt 0 ]; then
                  echo "$TOUCHED"
                  echo "OK — davranış-yüzeyi değişti ama MERGED PR'dan geldi (F1 geçti; review disiplini korundu)"
                else
                  echo "$TOUCHED"
                  echo "::error::main'e DOĞRUDAN push davranış-yüzeyine dokunuyor (F1 — yalnız lider-onaylı PR)"
                  exit 1
                fi
              fi
            fi
          fi
          echo "OK"
