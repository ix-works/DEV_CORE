# core-ci — DEV_CORE required-check (B12).
# Pre-commit gate'inin sunucu aynası: hook lokalde atlansa bile merge EDILEMEZ.
# Required-check baglama (B14 push + ilk yesil kosudan SONRA):
#   main-ruleset'e (id 18667766) "gates" job'u required_status_checks olarak eklenir + ruleset ENABLE edilir.
name: core-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklar
        run: pip install --quiet requests urllib3

      - name: Genericize-leak + link-audit + applies_to sema (TAM AGAC)
        run: python scripts/git-hooks/core_precommit.py --all

      - name: Validators (CORE modu)
        run: python scripts/validators/run_all_validators.py

      - name: Derleme taramasi (py_compile)
        run: python -m compileall -q scripts mcp_servers

      # Guard regresyonu: yanlis-pozitif kapali MI + gercek koruma ayakta MI + ikinci
      # kabuk yuzeyi (PowerShell) kapali MI. Kosmayan test gate degildir.
      # Ag/proje bagimli senaryolar (PUBLIC-PR canli gorunurluk, freeze kokleri)
      # burada otomatik atlanir; tam kosum icin IX_GUARD_TEST_LIVE=1 + repo env'leri.
      - name: Guard yuzeyi regresyonu (pre_tool_guard)
        run: python scripts/tests/test_pre_tool_guard.py

      # META-GATE (2026-07-10 saglik denetimi): her guard kurali icin ③tetiklenmeli /
      # ④tetiklenmemeli + kablolama + "kanitsiz kural = FAIL". Sahte-gate sinifini
      # yapisal olarak imkansiz kilar. template_project'i de kapsar (iki-proje matrisi).
      # Once Z4 oz-testi kosar: harness notr guard'a yesil basarsa CI kirilir (harness bozuk).
      - name: Guard konformans matrisi (self-test + template_project)
        run: |
          python scripts/tests/guard_conformance.py --self-test-only
          if [ -d ../template_project ]; then
            python scripts/tests/guard_conformance.py --project ../template_project
          else
            echo "template_project yok — yalniz self-test kosuldu (CI'da tek repo checkout)"
          fi
